name: renderobjects
description: A documentation site built with Jaspr
version: 0.0.1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  jaspr: ^0.23.1
  jaspr_content: ^0.5.2
  jaspr_flutter_embed: ^0.4.11
  jaspr_router: ^0.8.2
  syntax_highlight_lite: ^0.0.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.5.1
  flutter_test:
    sdk: flutter
  jaspr_builder: ^0.23.1
  lints: ^5.0.0

jaspr:
  mode: static
  flutter: embedded

flutter:
  uses-material-design: true
